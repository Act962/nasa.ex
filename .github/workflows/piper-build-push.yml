# ============================================================
# Build & publish Piper TTS image to GHCR.
# ============================================================
#
# 🚨 DEV / PROD CHECKLIST (uma vez por repo):
#
# 1. Primeira execução desse workflow vai criar o package em
#    https://github.com/users/Weydsonlima/packages/container/
#      nasaex-wey%2Fpiper-tts
#    Por padrão é PRIVADO. Pra o servidor de prod conseguir puxar
#    sem auth, torne público:
#       Package Settings → Danger Zone → Change visibility → Public
#
# 2. Em prod, o docker-compose.prod.yml puxa
#       ghcr.io/weydsonlima/nasaex-wey/piper-tts:latest
#    Se mantiver privado, configure docker login no host de prod com
#    um PAT (Personal Access Token) que tenha read:packages.
#
# 3. Imagens são multi-arch (amd64 + arm64), serve qualquer host Linux.
# ============================================================

name: Build & Push Piper TTS image

on:
  push:
    branches: [main]
    paths:
      - "docker/piper/**"
      - ".github/workflows/piper-build-push.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercased image name
        id: repo
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/piper-tts" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=pt-BR-faber-medium

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./docker/piper
          file: ./docker/piper/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
