# Override produção pra docker-compose.yml.
#
# Usar com:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Diferenças vs dev:
#   - Piper puxa imagem publicada do GHCR (não builda local).
#   - Postgres removido — assume DB managed externo (Neon/Supabase/RDS).
#   - Portas internas — nada exposto pro host por default (acesso via
#     proxy reverso, ex: Caddy/Traefik/nginx).

services:
  # Postgres é desabilitado em prod (replace_init na convenção compose).
  # Use DATABASE_URL apontando pra DB managed.
  postgres:
    deploy:
      replicas: 0

  piper:
    # Pull da imagem multi-arch publicada via GitHub Actions.
    # Tag "latest" segue a branch main; pra fixar em commit, use
    # "sha-<short>" ou crie uma tag git.
    image: ghcr.io/weydsonlima/nasaex-wey/piper-tts:latest
    build: !reset null  # cancela o build do compose base
    ports:
      # Em prod, restrinja ao localhost ou rede interna. Se Next.js
      # estiver no mesmo host, conexão via 127.0.0.1:10200 vai funcionar.
      # Se Next.js estiver em Vercel/externo, exponha via proxy reverso
      # com TLS (Caddy/Traefik) e seta PIPER_HTTP_URL=https://piper.dom.
      - "127.0.0.1:10200:10200"
    environment:
      PIPER_ALLOWED_ORIGINS: "${PIPER_ALLOWED_ORIGINS:-}"
    restart: always
    pull_policy: always
