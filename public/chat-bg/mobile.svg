<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="900" fill="#dbe9f7"/>
  <g fill="none" stroke="#9ab4d6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <!-- Saturno topo-esquerda -->
    <g transform="translate(90 110)">
      <circle cx="0" cy="0" r="35"/>
      <ellipse cx="0" cy="0" rx="55" ry="13" transform="rotate(-15)"/>
    </g>
    <!-- Lua topo-direita -->
    <g transform="translate(440 100)">
      <circle cx="0" cy="0" r="24"/>
      <circle cx="-8" cy="-4" r="3" fill="#9ab4d6" stroke="none"/>
      <circle cx="6" cy="6" r="2" fill="#9ab4d6" stroke="none"/>
    </g>
    <!-- Constelação topo -->
    <g transform="translate(220 60)">
      <circle cx="0" cy="0" r="2.5" fill="#9ab4d6" stroke="none"/>
      <circle cx="30" cy="10" r="2.5" fill="#9ab4d6" stroke="none"/>
      <circle cx="60" cy="-5" r="2.5" fill="#9ab4d6" stroke="none"/>
      <circle cx="95" cy="15" r="2.5" fill="#9ab4d6" stroke="none"/>
      <line x1="0" y1="0" x2="30" y2="10"/>
      <line x1="30" y1="10" x2="60" y2="-5"/>
      <line x1="60" y1="-5" x2="95" y2="15"/>
    </g>
    <!-- Astronauta esquerda -->
    <g transform="translate(140 250)">
      <circle cx="0" cy="-22" r="20"/>
      <rect x="-16" y="-2" width="32" height="36" rx="6"/>
      <rect x="-9" y="6" width="18" height="14" rx="2"/>
      <path d="M-16 5 l-13 -4 M16 5 l14 8"/>
      <path d="M-10 34 l-4 14 M10 34 l4 14"/>
      <path d="M0 -12 q4 -3 8 0" stroke-width="1.2"/>
    </g>
    <!-- Cometa direita meio-cima -->
    <g transform="translate(440 220)">
      <circle cx="0" cy="0" r="11"/>
      <path d="M-11 5 l-30 15 M-9 0 l-32 5 M-11 -5 l-28 -8" stroke-width="2.2"/>
    </g>
    <!-- Foguete grande direita -->
    <g transform="translate(470 380) rotate(20)">
      <path d="M0 -45 q17 22 0 45 q-17 -22 0 -45 z"/>
      <circle cx="0" cy="-12" r="5"/>
      <path d="M-9 30 l-4 12 M9 30 l4 12 M0 35 l0 12"/>
      <path d="M-16 18 l-14 16 l13 -3 z M16 18 l14 16 l-13 -3 z"/>
    </g>
    <!-- Foguete pequeno meio -->
    <g transform="translate(250 420) rotate(-10)">
      <path d="M0 -30 q12 14 0 30 q-12 -14 0 -30 z"/>
      <circle cx="0" cy="-8" r="3.5"/>
      <path d="M-6 22 l-4 10 M6 22 l4 10"/>
      <path d="M-9 12 l-9 12 l9 -2 z M9 12 l9 12 l-9 -2 z"/>
    </g>
    <!-- Planeta com listras meio-esq -->
    <g transform="translate(110 470)">
      <circle cx="0" cy="0" r="28"/>
      <path d="M-22 -8 q22 -8 44 4 M-20 8 q20 -8 38 2"/>
    </g>
    <!-- UFO direita meio-baixo -->
    <g transform="translate(420 580)">
      <ellipse cx="0" cy="5" rx="36" ry="8"/>
      <path d="M-18 -2 q18 -20 36 0"/>
      <circle cx="-10" cy="2" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="0" cy="3" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="10" cy="2" r="2" fill="#9ab4d6" stroke="none"/>
    </g>
    <!-- Astronauta paz baixo-direita -->
    <g transform="translate(450 720)">
      <circle cx="0" cy="-22" r="20"/>
      <rect x="-16" y="-2" width="32" height="36" rx="6"/>
      <rect x="-9" y="6" width="18" height="14" rx="2"/>
      <path d="M14 -8 l16 -14 M14 5 l9 11 l4 -8"/>
      <path d="M-12 -8 l-12 -4"/>
      <path d="M-10 34 l-4 14 M10 34 l4 14"/>
    </g>
    <!-- Saturno baixo-esq -->
    <g transform="translate(100 720)">
      <circle cx="0" cy="0" r="32"/>
      <ellipse cx="0" cy="0" rx="50" ry="12" transform="rotate(-10)"/>
    </g>
    <!-- Telescópio baixo-meio -->
    <g transform="translate(260 820)">
      <path d="M-25 -18 l40 -10 l8 25 l-40 10 z"/>
      <line x1="3" y1="7" x2="3" y2="22"/>
      <path d="M-12 25 l30 0"/>
    </g>
    <!-- Estrelas espalhadas -->
    <g stroke-width="1.2">
      <path d="M60 250 l3 6 l6 1 l-5 4 l1 6 l-5 -3 l-5 3 l1 -6 l-5 -4 l6 -1 z" stroke-width="1"/>
      <path d="M340 350 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M540 470 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M30 540 l3 6 l6 1 l-5 4 l1 6 l-5 -3 l-5 3 l1 -6 l-5 -4 l6 -1 z" stroke-width="1"/>
      <path d="M380 130 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M250 630 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M530 800 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M120 380 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
    </g>
    <!-- Poeira espacial -->
    <g fill="#9ab4d6" stroke="none" opacity="0.5">
      <circle cx="180" cy="180" r="1.8"/>
      <circle cx="310" cy="280" r="1.5"/>
      <circle cx="500" cy="320" r="1.8"/>
      <circle cx="80" cy="600" r="1.5"/>
      <circle cx="370" cy="580" r="1.5"/>
      <circle cx="550" cy="660" r="1.8"/>
      <circle cx="200" cy="750" r="1.5"/>
      <circle cx="400" cy="850" r="1.5"/>
      <circle cx="40" cy="400" r="1.5"/>
      <circle cx="560" cy="200" r="1.8"/>
    </g>
    <!-- Constelação baixo -->
    <g transform="translate(180 650)" stroke-width="1.2">
      <circle cx="0" cy="0" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="22" cy="15" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="42" cy="6" r="2" fill="#9ab4d6" stroke="none"/>
      <line x1="0" y1="0" x2="22" y2="15"/>
      <line x1="22" y1="15" x2="42" y2="6"/>
    </g>
  </g>
</svg>
