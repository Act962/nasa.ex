<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <!-- Fundo azul-clarinho estilo WhatsApp NASA -->
  <rect width="1200" height="800" fill="#dbe9f7"/>
  <g fill="none" stroke="#9ab4d6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <!-- Saturno topo-esquerda -->
    <g transform="translate(120 100)">
      <circle cx="0" cy="0" r="38"/>
      <ellipse cx="0" cy="0" rx="58" ry="14" transform="rotate(-15)"/>
      <path d="M-12 -10 q4 -4 8 0 M5 5 q4 -4 8 0"/>
    </g>
    <!-- Lua topo -->
    <g transform="translate(380 80)">
      <circle cx="0" cy="0" r="22"/>
      <circle cx="-8" cy="-4" r="3" fill="#9ab4d6" stroke="none"/>
      <circle cx="6" cy="6" r="2" fill="#9ab4d6" stroke="none"/>
    </g>
    <!-- Constelação -->
    <g transform="translate(560 60)">
      <circle cx="0" cy="0" r="2.5" fill="#9ab4d6" stroke="none"/>
      <circle cx="30" cy="10" r="2.5" fill="#9ab4d6" stroke="none"/>
      <circle cx="60" cy="-5" r="2.5" fill="#9ab4d6" stroke="none"/>
      <circle cx="95" cy="15" r="2.5" fill="#9ab4d6" stroke="none"/>
      <line x1="0" y1="0" x2="30" y2="10"/>
      <line x1="30" y1="10" x2="60" y2="-5"/>
      <line x1="60" y1="-5" x2="95" y2="15"/>
    </g>
    <!-- Satélite -->
    <g transform="translate(850 90)">
      <circle cx="0" cy="0" r="12"/>
      <rect x="-30" y="-5" width="14" height="10" rx="2"/>
      <rect x="16" y="-5" width="14" height="10" rx="2"/>
      <line x1="-16" y1="0" x2="-30" y2="0" stroke-dasharray="2 3"/>
      <line x1="16" y1="0" x2="30" y2="0" stroke-dasharray="2 3"/>
      <path d="M0 12 l3 12 l-6 0 z"/>
    </g>
    <!-- Foguete topo-direita -->
    <g transform="translate(1080 130) rotate(20)">
      <path d="M0 -40 q15 20 0 40 q-15 -20 0 -40 z"/>
      <circle cx="0" cy="-10" r="4"/>
      <path d="M-8 25 l-4 10 M8 25 l4 10 M0 30 l0 10"/>
      <path d="M-15 15 l-12 15 l12 -3 z M15 15 l12 15 l-12 -3 z"/>
    </g>
    <!-- Astronauta esquerda meio -->
    <g transform="translate(280 240)">
      <circle cx="0" cy="-20" r="18"/>
      <rect x="-15" y="-2" width="30" height="34" rx="6"/>
      <rect x="-8" y="6" width="16" height="14" rx="2"/>
      <path d="M-15 5 l-12 -4 M15 5 l14 8"/>
      <path d="M-10 32 l-4 14 M10 32 l4 14"/>
      <path d="M0 -10 q4 -3 8 0" stroke-width="1.2"/>
    </g>
    <!-- Cometa meio -->
    <g transform="translate(620 200)">
      <circle cx="0" cy="0" r="10"/>
      <path d="M-10 5 l-30 15 M-8 0 l-32 5 M-10 -5 l-28 -8" stroke-width="2.2"/>
    </g>
    <!-- UFO direita meio -->
    <g transform="translate(940 280)">
      <ellipse cx="0" cy="5" rx="35" ry="8"/>
      <path d="M-18 -2 q18 -20 36 0"/>
      <circle cx="-10" cy="2" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="0" cy="3" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="10" cy="2" r="2" fill="#9ab4d6" stroke="none"/>
    </g>
    <!-- Planeta com anel direita -->
    <g transform="translate(1100 320)">
      <circle cx="0" cy="0" r="28"/>
      <ellipse cx="0" cy="0" rx="42" ry="10" transform="rotate(20)"/>
    </g>
    <!-- Foguete grande esquerda meio-baixo -->
    <g transform="translate(150 480) rotate(-15)">
      <path d="M0 -50 q18 25 0 50 q-18 -25 0 -50 z"/>
      <circle cx="0" cy="-15" r="6"/>
      <path d="M-10 35 l-5 12 M10 35 l5 12"/>
      <path d="M-18 20 l-15 18 l14 -3 z M18 20 l15 18 l-14 -3 z"/>
    </g>
    <!-- Planeta verde -->
    <g transform="translate(360 450)">
      <circle cx="0" cy="0" r="32"/>
      <path d="M-25 -10 q25 -10 50 5 M-22 8 q24 -8 44 2"/>
    </g>
    <!-- Foguetinho pequeno meio -->
    <g transform="translate(550 460) rotate(10)">
      <path d="M0 -25 q10 12 0 25 q-10 -12 0 -25 z"/>
      <circle cx="0" cy="-7" r="3"/>
      <path d="M-5 18 l-3 8 M5 18 l3 8"/>
    </g>
    <!-- Astronauta paz à direita -->
    <g transform="translate(870 460)">
      <circle cx="0" cy="-22" r="20"/>
      <rect x="-16" y="-2" width="32" height="36" rx="6"/>
      <rect x="-8" y="6" width="16" height="14" rx="2"/>
      <path d="M15 -5 l16 -14 M14 5 l8 10 l4 -8"/>
      <path d="M-12 -8 l-12 -4"/>
      <path d="M-10 34 l-4 14 M10 34 l4 14"/>
    </g>
    <!-- Telescópio baixo-meio -->
    <g transform="translate(340 680)">
      <path d="M-25 -20 l40 -10 l8 25 l-40 10 z"/>
      <path d="M-25 -20 l-8 5 M15 -30 l5 -2"/>
      <line x1="3" y1="5" x2="3" y2="22"/>
      <path d="M-12 25 l30 0"/>
      <line x1="-10" y1="22" x2="-12" y2="25"/>
      <line x1="16" y1="22" x2="18" y2="25"/>
    </g>
    <!-- Saturno baixo-esquerda -->
    <g transform="translate(110 720)">
      <circle cx="0" cy="0" r="36"/>
      <ellipse cx="0" cy="0" rx="55" ry="13" transform="rotate(-10)"/>
    </g>
    <!-- Observatório/cupola baixo -->
    <g transform="translate(720 720)">
      <path d="M-25 10 q0 -30 25 -30 q25 0 25 30 z"/>
      <line x1="-25" y1="10" x2="25" y2="10"/>
      <line x1="0" y1="-20" x2="0" y2="10"/>
    </g>
    <!-- UFO baixo-direita -->
    <g transform="translate(960 730)">
      <ellipse cx="0" cy="5" rx="38" ry="9"/>
      <path d="M-20 -2 q20 -22 40 0"/>
      <circle cx="-12" cy="2" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="0" cy="3" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="12" cy="2" r="2" fill="#9ab4d6" stroke="none"/>
      <path d="M-15 -22 l-8 -12 M15 -22 l8 -12 M0 -28 l0 -14"/>
    </g>
    <!-- Astronauta baixo-esquerda -->
    <g transform="translate(40 540)">
      <circle cx="0" cy="-20" r="18"/>
      <rect x="-14" y="-2" width="28" height="32" rx="6"/>
      <path d="M-14 5 l-12 -4 M14 5 l12 8"/>
      <path d="M-9 30 l-4 14 M9 30 l4 14"/>
    </g>
    <!-- Estrelas pequenas e brilhos espalhados -->
    <g stroke-width="1.2">
      <path d="M70 200 l3 6 l6 1 l-5 4 l1 6 l-5 -3 l-5 3 l1 -6 l-5 -4 l6 -1 z" stroke-width="1"/>
      <path d="M450 180 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M720 380 l3 6 l6 1 l-5 4 l1 6 l-5 -3 l-5 3 l1 -6 l-5 -4 l6 -1 z" stroke-width="1"/>
      <path d="M50 380 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M790 180 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M1000 500 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M250 580 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M500 700 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M850 660 l3 6 l6 1 l-5 4 l1 6 l-5 -3 l-5 3 l1 -6 l-5 -4 l6 -1 z" stroke-width="1"/>
      <path d="M1130 580 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M420 350 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
      <path d="M650 580 l2 4 l5 1 l-4 3 l1 5 l-4 -2 l-4 2 l1 -5 l-4 -3 l5 -1 z" stroke-width="1"/>
    </g>
    <!-- Pequenos círculos espalhados (poeira espacial) -->
    <g fill="#9ab4d6" stroke="none" opacity="0.5">
      <circle cx="180" cy="320" r="1.8"/>
      <circle cx="490" cy="120" r="1.8"/>
      <circle cx="780" cy="220" r="1.5"/>
      <circle cx="220" cy="620" r="1.5"/>
      <circle cx="660" cy="120" r="1.5"/>
      <circle cx="980" cy="180" r="2"/>
      <circle cx="1180" cy="430" r="1.8"/>
      <circle cx="40" cy="280" r="1.5"/>
      <circle cx="600" cy="540" r="1.5"/>
      <circle cx="320" cy="780" r="1.8"/>
      <circle cx="820" cy="600" r="1.5"/>
      <circle cx="1080" cy="660" r="1.8"/>
    </g>
    <!-- Mais constelação -->
    <g transform="translate(440 580)" stroke-width="1.2">
      <circle cx="0" cy="0" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="20" cy="15" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="40" cy="8" r="2" fill="#9ab4d6" stroke="none"/>
      <circle cx="60" cy="20" r="2" fill="#9ab4d6" stroke="none"/>
      <line x1="0" y1="0" x2="20" y2="15"/>
      <line x1="20" y1="15" x2="40" y2="8"/>
      <line x1="40" y1="8" x2="60" y2="20"/>
    </g>
  </g>
</svg>
